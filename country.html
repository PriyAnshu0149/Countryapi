<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Country</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link href="https://fonts.googleapis.com/css?family=Nunito:200,300,regular,500,600,700,800,900" rel="stylesheet" />
    <link rel="stylesheet" href="country.css">
    <link rel="stylesheet" href="style.css">
    <script src="country.js" defer></script>
</head>
<body>
   <header class="header-container" >
        <div class="header-content">
            <h2 class="title"><a href="/">Where in the world?</a></h2>
        <p class="theme-changer"><i class="fa-regular fa-moon"></i>&nbsp;&nbsp;Dark Mode</p>
        </div>
    </header>
    <main>
  <div class="country-details-container">
          <span class="back-button" onclick="history.back()"><i class="fa-solid fa-arrow-left"></i>&nbsp; Back</span>
        <div class="country-details">
            <img src="" alt="">
            <div class="detail-text-container">
                <h1>Iceland</h1>
                <div class="detail-text">
                  <P><b>Native Name: </b><span class="native-name"></span></P>  
                 <P><b>Population: </b><span class="Population"></span></P>
                 <P><b>Region: </b><span class="region"></span></P>
                 <P><b>Sub Region: </b><span class="sub-region"></span></P>
                 <P><b>Capital: </b><span class="capital"></span></P>
                 <P><b>Top Level Domain: </b><span class="top-level-domain">Ber</span></P>
                  <P><b>Currencies: </b><span class="currencies"></span></P>
                   <P><b>Languages: </b><span class="languages"></span></P>
                 </div>
                 <div class="border-countries">
                    <b>Border Countries: </b> &nbsp;
                 </div>

            </div>

        </div>
  </div>
    </main>
</body>
</html>
